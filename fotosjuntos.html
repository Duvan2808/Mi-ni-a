    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: #0d0010;
            overflow-x: hidden;
            height: 100%;
        }

        .contenedor {
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
        }

        .titulo-galeria {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #fbb6ce;
            text-align: center;
            font-size: 18px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(244,114,182,0.5);
        }
        .titulo-galeria::before,
        .titulo-galeria::after { content: ' ✦ '; color: rgba(244,114,182,0.4); }

        .galeria {
            columns: 3 180px;
            column-gap: 12px;
        }

        .galeria img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            break-inside: avoid;
        }

        .galeria img:hover {
            transform: scale(1.04) translateY(-3px);
            box-shadow: 0 8px 32px rgba(244,114,182,0.35);
        }
    </style>
</head>
